name: Configure Providers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to configure
        required: true
        type: choice
        options: [development, production]
      mode:
        description: Plan, apply, or verify provider configuration
        required: true
        default: plan
        type: choice
        options: [plan, apply, verify]

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENV: ${{ inputs.environment }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets['GOOGLE_OAUTH_CLIENT_SECRET'] }}
      STRIPE_SECRET_KEY: ${{ secrets['STRIPE_SECRET_KEY'] }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets['STRIPE_WEBHOOK_SECRET'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve versioned public config
        run: node scripts/generate-env.mjs --export-public
      - name: Configure provider integrations
        run: node scripts/configure-providers.mjs --${{ inputs.mode }}
