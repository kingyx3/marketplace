name: Configure Providers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to inspect or repair
        required: true
        type: environment
      mode:
        description: Plan, apply, or verify provider configuration
        required: true
        default: plan
        type: choice
        options: [plan, apply, verify]

concurrency:
  group: marketplace-environment-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENV: ${{ inputs.environment }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      GOOGLE_AUTH_ENABLED: ${{ vars.GOOGLE_AUTH_ENABLED }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      STRIPE_WEBHOOK_ENDPOINT_ID: ${{ vars.STRIPE_WEBHOOK_ENDPOINT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict
      - name: Inspect or repair provider integrations
        run: node scripts/configure-providers.mjs --${{ inputs.mode }}
