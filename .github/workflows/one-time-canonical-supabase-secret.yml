name: One-time canonical Supabase secret cleanup

on:
  push:
    branches: [agent/fix-development-supabase-runtime]
    paths: [.github/workflows/one-time-canonical-supabase-secret.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/fix-development-supabase-runtime
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
      - name: Patch the release gate and remove this one-time workflow
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, unlink, writeFile } from "node:fs/promises";

          const target = ".github/workflows/hosted-release-gates.yml";
          const self = ".github/workflows/one-time-canonical-supabase-secret.yml";
          const deprecatedName = ["SUPABASE", "SERVICE", "ROLE", "KEY"].join("_");
          const expressionStart = "$" + "{{ secrets.";
          const oldValue =
            expressionStart + "SUPABASE_SECRET_KEY || secrets." + deprecatedName + " }}";
          const newValue = expressionStart + "SUPABASE_SECRET_KEY }}";
          const current = await readFile(target, "utf8");
          if (current.split(oldValue).length !== 2) {
            throw new Error("Expected exactly one deprecated Supabase secret fallback");
          }
          await writeFile(target, current.replace(oldValue, newValue), "utf8");
          await unlink(self);
          NODE
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/hosted-release-gates.yml .github/workflows/one-time-canonical-supabase-secret.yml
          git commit -m "Remove legacy Supabase secret from release gates"
          git push origin HEAD:agent/fix-development-supabase-runtime
