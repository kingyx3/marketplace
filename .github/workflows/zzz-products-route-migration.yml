name: ZZZ-Products Route Migration

on:
  push:
    branches:
      - agent/consolidate-control-operations
    paths:
      - .github/workflows/zzz-products-route-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7.0.0
        with:
          ref: agent/consolidate-control-operations
          fetch-depth: 0

      - name: Replace legacy storefront route literals
        shell: python
        run: |
          from pathlib import Path

          excluded = {".git", "node_modules", ".next", "playwright-report", "test-results"}
          text_suffixes = {
              ".ts", ".tsx", ".js", ".jsx", ".mjs", ".cjs", ".json", ".md", ".sql",
              ".yml", ".yaml", ".toml", ".txt", ".example"
          }
          replacements = (
              ('"/catalog', '"/products'),
              ("'/catalog", "'/products"),
              ('`/catalog', '`/products'),
              ('(/catalog', '(/products'),
              (' /catalog', ' /products'),
          )

          for path in Path(".").rglob("*"):
              if not path.is_file() or any(part in excluded for part in path.parts):
                  continue
              if path.suffix not in text_suffixes and path.name not in {"README", "LICENSE"}:
                  continue
              try:
                  original = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              updated = original
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != original:
                  path.write_text(updated, encoding="utf-8")

          workflow = Path(".github/workflows/zzz-products-route-migration.yml")
          workflow.unlink()

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Complete products route migration"
          git push origin HEAD:agent/consolidate-control-operations
