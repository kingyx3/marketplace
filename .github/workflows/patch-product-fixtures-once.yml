name: Patch product fixture gating once

on:
  push:
    branches:
      - agent/production-readiness-audit

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Gate product fixtures
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/(shop)/catalog/[slug]/page.tsx')
          text = path.read_text()
          replacements = [
              (
                  'import { formatMoney as formatSharedMoney } from "@/lib/money";\n',
                  'import { formatMoney as formatSharedMoney } from "@/lib/money";\nimport { previewFixturesEnabled } from "@/lib/preview-fixtures";\n',
              ),
              (
                  '  const product = getProduct(slug);\n',
                  '  const product = previewFixturesEnabled() ? getProduct(slug) : undefined;\n',
              ),
              (
                  '  const product = mergeProduct(liveProduct, getProduct(slug));\n',
                  '  const product = mergeProduct(\n    liveProduct,\n    previewFixturesEnabled() ? getProduct(slug) : undefined\n  );\n',
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one replacement, found {count}: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/patch-product-fixtures-once.yml
      - name: Commit product gating
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'app/(shop)/catalog/[slug]/page.tsx' .github/workflows/patch-product-fixtures-once.yml
          git commit -m "fix: gate product fixtures outside production"
          git push origin "HEAD:${GITHUB_REF_NAME}"
