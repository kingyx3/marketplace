name: Repair lockfile once

on:
  push:
    branches:
      - agent/production-readiness-audit

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Update lockfile from pinned manifest
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Remove one-shot workflow
        run: rm .github/workflows/repair-lockfile-once.yml
      - name: Commit repaired lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/repair-lockfile-once.yml
          git commit -m "chore: sync lockfile with stable TypeScript"
          git push origin "HEAD:${GITHUB_REF_NAME}"
