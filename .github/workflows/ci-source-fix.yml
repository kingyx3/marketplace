name: One-time bootstrap grant acceptance fix

on:
  push:
    branches:
      - agent/control-supply-work-queue
    paths:
      - .github/workflows/ci-source-fix.yml

permissions:
  contents: write

jobs:
  patch-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/control-supply-work-queue
      - name: Preserve or initialize administrator acceptance
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const sourcePath = 'scripts/bootstrap-database.mjs';
          let source = fs.readFileSync(sourcePath, 'utf8');
          const oldBlock = `  await upsert(client, "admin_access_grants", {
            id: FIXTURE_IDS.grant,
            email: actorEmail,
            role: "owner",
            active: true,
            auth_user_id: actorUser.id,
            created_by_staff_id: FIXTURE_IDS.staff,
            revoked_at: null,
          });`;
          const newBlock = `  const { data: existingGrant, error: existingGrantError } = await client
            .from("admin_access_grants")
            .select("accepted_at")
            .eq("id", FIXTURE_IDS.grant)
            .maybeSingle();
          if (existingGrantError) {
            throw new Error(\`Could not read bootstrap administrator grant: ${'${existingGrantError.message}'}\`);
          }
          await upsert(client, "admin_access_grants", {
            id: FIXTURE_IDS.grant,
            email: actorEmail,
            role: "owner",
            active: true,
            auth_user_id: actorUser.id,
            created_by_staff_id: FIXTURE_IDS.staff,
            accepted_at: existingGrant?.accepted_at ?? now.toISOString(),
            revoked_at: null,
          });`;
          if (!source.includes(oldBlock)) {
            throw new Error('Expected administrator grant fixture block was not found');
          }
          source = source.replace(oldBlock, newBlock);
          fs.writeFileSync(sourcePath, source);
          fs.unlinkSync('.github/workflows/ci-source-fix.yml');
          NODE

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/bootstrap-database.mjs .github/workflows/ci-source-fix.yml
          git commit -m "fix(ci): make grant acceptance bootstrap idempotent"
          git push origin HEAD:agent/control-supply-work-queue
