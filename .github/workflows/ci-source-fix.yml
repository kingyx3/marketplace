name: One-time bootstrap safety fix

on:
  push:
    branches:
      - agent/control-supply-work-queue
    paths:
      - .github/workflows/ci-source-fix.yml

permissions:
  contents: write

jobs:
  patch-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/control-supply-work-queue
      - name: Scope bootstrap safety to the database endpoint
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const sourcePath = 'scripts/bootstrap-database.mjs';
          let source = fs.readFileSync(sourcePath, 'utf8');

          const oldCall = '  assertTargetSafety(target, supabaseUrl, siteUrl);';
          const newCall = '  assertTargetSafety(target, supabaseUrl);';
          if (!source.includes(oldCall)) {
            throw new Error('Expected bootstrap safety call was not found');
          }
          source = source.replace(oldCall, newCall);

          const oldFunction = `function assertTargetSafety(target, supabaseUrl, siteUrl) {
            if (target === "production") throw new Error("Production database bootstrap is prohibited");
            const combined = \`${'${supabaseUrl} ${siteUrl}'}\`.toLowerCase();
            if (/\\bprod(?:uction)?\\b/.test(combined)) {
              throw new Error(\`Refusing to bootstrap ${'${target}'} with a production-looking URL\`);
            }
          }`;
          const newFunction = `export function assertTargetSafety(target, supabaseUrl) {
            if (target === "production") throw new Error("Production database bootstrap is prohibited");
            const databaseHost = new URL(supabaseUrl).hostname.toLowerCase();
            if (/(?:^|[.-])prod(?:uction)?(?:[.-]|$)/.test(databaseHost)) {
              throw new Error(
                \`Refusing to bootstrap ${'${target}'} with a production-looking database URL\`
              );
            }
          }`;
          if (!source.includes(oldFunction)) {
            throw new Error('Expected bootstrap safety implementation was not found');
          }
          source = source.replace(oldFunction, newFunction);
          fs.writeFileSync(sourcePath, source);

          fs.unlinkSync('.github/workflows/ci-source-fix.yml');
          NODE

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/bootstrap-database.mjs .github/workflows/ci-source-fix.yml
          git commit -m "fix(ci): scope bootstrap safety to database target"
          git push origin HEAD:agent/control-supply-work-queue
