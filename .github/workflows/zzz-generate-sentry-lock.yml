name: ZZZ-Generate Sentry lockfile

on:
  push:
    branches: [agent/add-production-sentry-observability]

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/add-production-sentry-observability
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Generate deterministic dependency lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Remove one-shot workflow and commit lockfile
        shell: bash
        run: |
          git rm .github/workflows/zzz-generate-sentry-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Lock Sentry SDK dependencies"
          git push origin HEAD:agent/add-production-sentry-observability
