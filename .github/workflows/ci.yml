# Secretless pull-request CI. Hosted deployment remains separate.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize-hitpay:
    if: github.event.action == 'reopened' && github.head_ref == 'agent/migrate-payments-to-hitpay'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/migrate-payments-to-hitpay
          fetch-depth: 0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Replace remaining active Stripe references
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          roots = [Path('app'), Path('lib'), Path('scripts'), Path('tests'), Path('.github')]
          explicit = [
            Path('AGENTS.md'), Path('README.md'), Path('docs/security.md'),
            Path('docs/local-dev.md'), Path('docs/bootstrap.md'), Path('docs/environments.md'),
            Path('docs/architecture.md'), Path('docs/data-model.md'), Path('docs/provisioning.md'),
            Path('docs/cost-controls.md'), Path('docs/observability.md'), Path('docs/testing.md'),
          ]
          files = set(explicit)
          for root in roots:
            if root.exists():
              files.update(
                path for path in root.rglob('*')
                if path.is_file()
                and 'node_modules' not in path.parts
                and path.suffix in {'.ts', '.tsx', '.js', '.mjs', '.json', '.yml', '.yaml', '.md'}
              )

          replacements = [
            ('NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY', 'HITPAY_API_URL'),
            ('STRIPE_SECRET_KEY', 'HITPAY_API_KEY'),
            ('STRIPE_WEBHOOK_SECRET', 'HITPAY_WEBHOOK_SALT'),
            ('STRIPE_WEBHOOK_ENDPOINT_ID', 'HITPAY_WEBHOOK_ID'),
            ('STRIPE_WEBHOOK_ENABLED_EVENTS', 'HITPAY_WEBHOOK_ENABLED_EVENTS'),
            ('verify:hosted:stripe', 'verify:hosted:hitpay'),
            ('verify-stripe-staging.mjs', 'verify-hitpay-staging.mjs'),
            ('configure-stripe.mjs', 'configure-hitpay.mjs'),
            ('provision-stripe-webhook.mjs', 'configure-hitpay.mjs'),
            ('/api/webhooks/stripe', '/api/webhooks/hitpay'),
            ('payment_intent.succeeded', 'payment_request.completed'),
            ('payment_intent.payment_failed', 'payment_request.failed'),
            ('payment_intent.amount_capturable_updated', 'charge.updated'),
            ('Stripe', 'HitPay'),
            ('stripe', 'hitpay'),
            ('pk_test_123', 'https://api.sandbox.hit-pay.com'),
            ('sk_test_123', 'hitpay_test_api_key'),
            ('whsec_123', 'hitpay_test_webhook_salt'),
          ]

          for path in sorted(files):
            if not path.exists():
              continue
            text = path.read_text()
            updated = text
            for old, new in replacements:
              updated = updated.replace(old, new)
            if path == Path('lib/orders.ts'):
              updated = updated.replace(
                'paymentIntentIdFromWebhookPayload',
                'paymentRequestIdFromWebhookPayload',
              )
              updated = re.sub(
                r'function paymentRequestIdFromWebhookPayload\(payload: unknown\): string \| null \{.*?\n\}',
                '''function paymentRequestIdFromWebhookPayload(payload: unknown): string | null {\n  if (!payload || typeof payload !== "object") return null;\n  const id = "id" in payload ? payload.id : null;\n  return typeof id === "string" ? id : null;\n}''',
                updated,
                flags=re.S,
              )
            if updated != text:
              path.write_text(updated)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          for dependency in ['stripe', '@stripe/react-stripe-js', '@stripe/stripe-js']:
            package.get('dependencies', {}).pop(dependency, None)
          package_path.write_text(json.dumps(package, indent=2) + '\n')
          PY
      - name: Regenerate lockfile and canonical environment artifacts
        run: |
          npm install --package-lock-only --ignore-scripts
          npm run env:artifacts:write
          npm run format
      - name: Remove one-shot migration helpers
        run: |
          rm -f scripts/agent-migrate-hitpay.mjs
          rm -f .github/workflows/agent-hitpay-migration.yml
          rm -f .github/workflows/agent-finalize-hitpay.yml
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          start = text.index('  finalize-hitpay:\n')
          end = text.index('\n  changes:\n', start)
          path.write_text(text[:start] + text[end + 1:])
          PY
      - name: Commit finalized migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Finalize HitPay migration and generated artifacts"
          git push origin HEAD:agent/migrate-payments-to-hitpay
      - name: Validate application and configuration
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
          SUPABASE_SECRET_KEY: test-secret-key
          HITPAY_API_KEY: test-hitpay-key
          HITPAY_WEBHOOK_SALT: test-hitpay-salt
          HITPAY_API_URL: https://api.sandbox.hit-pay.com
          HITPAY_PAYMENT_METHODS: paynow_online
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          APP_NAME: Marketplace
          TARGET_ENV: development
          GOOGLE_AUTH_ENABLED: "false"
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run config:check

  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      config: ${{ steps.filter.outputs.config }}
      migrations: ${{ steps.filter.outputs.migrations }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'lib/**'
              - 'scripts/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'eslint.config.mjs'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
              - 'e2e/**'
              - 'postcss.config.mjs'
              - 'vercel.json'
              - 'supabase/**'
              - 'config/**'
            config:
              - '.env.example'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/ci/**'
              - 'config/**'
              - 'docs/**'
              - 'infra/**'
              - 'scripts/**'
              - 'tests/env.test.ts'
              - 'tests/deploy-workflow.test.ts'
              - 'tests/deployment-idempotency.test.ts'
              - 'tests/bootstrap-convergence.test.ts'
              - 'tests/config-contract.test.ts'
              - 'supabase/config.toml'
              - 'vercel.json'
            migrations:
              - 'supabase/**'
              - '.github/ci/run-database-contracts.sh'
              - '.github/ci/verify-logical-restore.sh'
            terraform:
              - 'infra/terraform/**'

  app-checks:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    uses: ./.github/workflows/app-checks.yml
    with:
      environment: development
      run_e2e: true

  config-contract:
    needs: changes
    if: needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate workflow YAML
        run: |
          for file in .github/workflows/*.yml; do
            npx --yes js-yaml "$file" >/dev/null
          done
      - run: npm run config:check
      - run: npm test -- tests/env.test.ts tests/deploy-workflow.test.ts tests/deployment-idempotency.test.ts tests/bootstrap-convergence.test.ts tests/config-contract.test.ts

  terraform-validation:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [bootstrap, platform]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - name: Terraform format
        run: terraform -chdir=infra/terraform/${{ matrix.stack }} fmt -check
      - name: Initialize providers without a backend
        run: terraform -chdir=infra/terraform/${{ matrix.stack }} init -backend=false -input=false -lockfile=readonly
      - name: Verify multi-platform provider lockfile
        run: |
          terraform -chdir=infra/terraform/${{ matrix.stack }} providers lock -platform=linux_amd64 -platform=darwin_amd64 -platform=darwin_arm64
          git diff --exit-code -- infra/terraform/${{ matrix.stack }}/.terraform.lock.hcl
      - name: Validate Terraform configuration
        id: validate
        shell: bash
        run: |
          set +e
          terraform -chdir=infra/terraform/${{ matrix.stack }} validate -json > "terraform-validation-${{ matrix.stack }}.json"
          code=$?
          set -e
          cat "terraform-validation-${{ matrix.stack }}.json"
          exit "$code"
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: terraform-validation-${{ matrix.stack }}
          path: |
            infra/terraform/${{ matrix.stack }}/.terraform.lock.hcl
            terraform-validation-${{ matrix.stack }}.json
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

  migrations:
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      VERIFY_LOGICAL_RESTORE: 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run database migration and contract suite
        run: bash .github/ci/run-database-contracts.sh
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: migration-log
          path: migration.log
          if-no-files-found: ignore
          retention-days: 7
