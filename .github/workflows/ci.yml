# Secretless pull-request CI. Hosted deployment remains separate.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  patch-bootstrap-source:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/control-supply-work-queue'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/control-supply-work-queue
      - name: Make administrator grant bootstrap idempotent
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("scripts/bootstrap-database.mjs")
          source = source_path.read_text()
          start_marker = '  await upsert(client, "admin_access_grants", {'
          end_marker = '\n\n  await verifyReferenceRow('
          start = source.find(start_marker)
          end = source.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("Expected administrator grant fixture boundaries were not found")
          replacement = "\n".join([
              '  const { data: existingGrant, error: existingGrantError } = await client',
              '    .from("admin_access_grants")',
              '    .select("accepted_at")',
              '    .eq("id", FIXTURE_IDS.grant)',
              '    .maybeSingle();',
              '  if (existingGrantError) {',
              '    throw new Error(',
              '      `Could not read bootstrap administrator grant: ${existingGrantError.message}`',
              '    );',
              '  }',
              '  await upsert(client, "admin_access_grants", {',
              '    id: FIXTURE_IDS.grant,',
              '    email: actorEmail,',
              '    role: "owner",',
              '    active: true,',
              '    auth_user_id: actorUser.id,',
              '    created_by_staff_id: FIXTURE_IDS.staff,',
              '    accepted_at: existingGrant?.accepted_at ?? now.toISOString(),',
              '    revoked_at: null,',
              '  });',
          ])
          source_path.write_text(source[:start] + replacement + source[end:])
          PY
      - name: Commit source fix
        shell: bash
        run: |
          git diff --check -- scripts/bootstrap-database.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/bootstrap-database.mjs
          git commit -m "fix(ci): make grant acceptance bootstrap idempotent"
          git push origin HEAD:agent/control-supply-work-queue

  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      config: ${{ steps.filter.outputs.config }}
      migrations: ${{ steps.filter.outputs.migrations }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'lib/**'
              - 'scripts/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'eslint.config.mjs'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
              - 'e2e/**'
              - 'postcss.config.mjs'
              - 'vercel.json'
              - 'supabase/**'
              - 'config/**'
            config:
              - '.env.example'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/ci/**'
              - 'config/**'
              - 'docs/**'
              - 'infra/**'
              - 'scripts/**'
              - 'tests/env.test.ts'
              - 'tests/deploy-workflow.test.ts'
              - 'tests/deployment-idempotency.test.ts'
              - 'tests/bootstrap-convergence.test.ts'
              - 'tests/config-contract.test.ts'
              - 'supabase/config.toml'
              - 'vercel.json'
            migrations:
              - 'supabase/**'
              - '.github/ci/run-database-contracts.sh'
              - '.github/ci/verify-logical-restore.sh'
            terraform:
              - 'infra/terraform/**'

  app-checks:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    uses: ./.github/workflows/app-checks.yml
    with:
      environment: development
      run_e2e: true

  config-contract:
    needs: changes
    if: needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate workflow YAML
        run: |
          for file in .github/workflows/*.yml; do
            npx --yes js-yaml "$file" >/dev/null
          done
      - run: npm run config:check
      - run: npm test -- tests/env.test.ts tests/deploy-workflow.test.ts tests/deployment-idempotency.test.ts tests/bootstrap-convergence.test.ts tests/config-contract.test.ts

  terraform-validation:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [bootstrap, platform]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - name: Terraform format
        run: terraform -chdir=infra/terraform/${{ matrix.stack }} fmt -check
      - name: Initialize providers without a backend
        run: terraform -chdir=infra/terraform/${{ matrix.stack }} init -backend=false -input=false -lockfile=readonly
      - name: Verify multi-platform provider lockfile
        run: |
          terraform -chdir=infra/terraform/${{ matrix.stack }} providers lock -platform=linux_amd64 -platform=darwin_amd64 -platform=darwin_arm64
          git diff --exit-code -- infra/terraform/${{ matrix.stack }}/.terraform.lock.hcl
      - name: Validate Terraform configuration
        id: validate
        shell: bash
        run: |
          set +e
          terraform -chdir=infra/terraform/${{ matrix.stack }} validate -json > "terraform-validation-${{ matrix.stack }}.json"
          code=$?
          set -e
          cat "terraform-validation-${{ matrix.stack }}.json"
          exit "$code"
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: terraform-validation-${{ matrix.stack }}
          path: |
            infra/terraform/${{ matrix.stack }}/.terraform.lock.hcl
            terraform-validation-${{ matrix.stack }}.json
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

  migrations:
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      VERIFY_LOGICAL_RESTORE: 'true'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run database migration and contract suite
        run: bash .github/ci/run-database-contracts.sh
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: migration-log
          path: migration.log
          if-no-files-found: ignore
          retention-days: 7
