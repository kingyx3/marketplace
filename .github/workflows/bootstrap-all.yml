name: Bootstrap & Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Environment scope to converge, deploy, and verify
        required: true
        default: all
        type: choice
        options: [all, development, production]

concurrency:
  group: marketplace-bootstrap-and-deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  checks:
    uses: ./.github/workflows/app-checks.yml
    with:
      run_e2e: true

  state:
    needs: checks
    uses: ./.github/workflows/terraform-state-bootstrap.yml
    with:
      environment: ${{ inputs.target == 'development' && 'development' || 'production' }}
      mode: converge
    secrets: inherit

  platform:
    needs: state
    uses: ./.github/workflows/terraform-platform.yml
    with:
      environment: ${{ inputs.target == 'development' && 'development' || 'production' }}
      mode: converge
    secrets: inherit

  bootstrap-development:
    if: ${{ inputs.target != 'production' }}
    needs: platform
    uses: ./.github/workflows/bootstrap-environment.yml
    with:
      environment: development
      mode: apply
    secrets: inherit

  deploy-development:
    if: ${{ inputs.target != 'production' }}
    needs: bootstrap-development
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
      skip_app_checks: true
    secrets: inherit

  verify-development:
    if: ${{ inputs.target != 'production' }}
    needs: deploy-development
    uses: ./.github/workflows/bootstrap-environment.yml
    with:
      environment: development
      mode: verify
    secrets: inherit

  bootstrap-production:
    if: ${{ always() && inputs.target != 'development' && needs.platform.result == 'success' && (inputs.target == 'production' || needs.verify-development.result == 'success') }}
    needs: [platform, verify-development]
    uses: ./.github/workflows/bootstrap-environment.yml
    with:
      environment: production
      mode: apply
    secrets: inherit

  deploy-production:
    if: ${{ inputs.target != 'development' }}
    needs: bootstrap-production
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      skip_app_checks: true
    secrets: inherit

  verify-production:
    if: ${{ inputs.target != 'development' }}
    needs: deploy-production
    uses: ./.github/workflows/bootstrap-environment.yml
    with:
      environment: production
      mode: verify
    secrets: inherit

  complete:
    if: always()
    needs: [checks, state, platform, verify-development, verify-production]
    runs-on: ubuntu-latest
    steps:
      - name: Assert requested scope completed
        env:
          TARGET: ${{ inputs.target }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          STATE_RESULT: ${{ needs.state.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
          DEVELOPMENT_RESULT: ${{ needs.verify-development.result }}
          PRODUCTION_RESULT: ${{ needs.verify-production.result }}
        run: |
          set -euo pipefail
          test "$CHECKS_RESULT" = success
          test "$STATE_RESULT" = success
          test "$PLATFORM_RESULT" = success
          if [ "$TARGET" != production ]; then test "$DEVELOPMENT_RESULT" = success; fi
          if [ "$TARGET" != development ]; then test "$PRODUCTION_RESULT" = success; fi
          echo "Bootstrap, deployment, and verification completed for $TARGET." >> "$GITHUB_STEP_SUMMARY"
