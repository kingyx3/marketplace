name: Terraform State Bootstrap

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the state bucket changes
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bootstrap-state:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG_OVERRIDE: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME_OVERRIDE: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION_OVERRIDE: ${{ vars.TF_STATE_BUCKET_LOCATION }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Resolve CI/CD variables
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_CREDENTIALS" ]; then
            echo "Missing required secret: GCP_TERRAFORM_CREDENTIALS_JSON" >&2
            exit 1
          fi
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "Missing required variable: GCP_PROJECT_ID" >&2
            exit 1
          fi
          project_slug="$PROJECT_SLUG_OVERRIDE"
          if [ -z "$project_slug" ]; then
            project_slug=$(basename "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g')
          fi
          bucket_name="$TF_STATE_BUCKET_NAME_OVERRIDE"
          if [ -z "$bucket_name" ]; then
            bucket_name=$(printf '%s-%s-tfstate' "$GCP_PROJECT_ID" "$project_slug" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g')
          fi
          bucket_location="${TF_STATE_BUCKET_LOCATION_OVERRIDE:-us-central1}"
          {
            echo "TF_VAR_gcp_project_id=$GCP_PROJECT_ID"
            echo "TF_VAR_project_slug=$project_slug"
            echo "TF_VAR_state_bucket_name=$bucket_name"
            echo "TF_VAR_state_bucket_location=$bucket_location"
          } >> "$GITHUB_ENV"
      - name: Terraform init
        working-directory: infra/terraform/bootstrap
        run: terraform init
      - name: Terraform fmt
        working-directory: infra/terraform/bootstrap
        run: terraform fmt -check
      - name: Terraform validate
        working-directory: infra/terraform/bootstrap
        run: terraform validate
      - name: Import state bucket if it already exists
        working-directory: infra/terraform/bootstrap
        run: terraform import google_storage_bucket.terraform_state "$TF_VAR_state_bucket_name" || true
      - name: Terraform plan
        working-directory: infra/terraform/bootstrap
        run: terraform plan -out=tfplan
      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: infra/terraform/bootstrap
        run: terraform apply -auto-approve tfplan
