name: Terraform State Bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment for Terraform credentials and variables
        required: true
        type: environment
      apply:
        description: Apply the state bucket changes
        required: true
        type: boolean
        default: false

concurrency:
  group: environment-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bootstrap-state:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENV: ${{ inputs.environment }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v3
      - name: Resolve CI/CD variables
        run: node scripts/resolve-terraform-inputs.mjs state
      - name: Terraform init
        working-directory: infra/terraform/bootstrap
        run: terraform init
      - name: Terraform fmt
        working-directory: infra/terraform/bootstrap
        run: terraform fmt -check
      - name: Terraform validate
        working-directory: infra/terraform/bootstrap
        run: terraform validate
      - name: Reconcile existing state bucket import
        run: node scripts/bootstrap-terraform-state-import.mjs
      - name: Terraform plan
        working-directory: infra/terraform/bootstrap
        run: terraform plan -out=tfplan
      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: infra/terraform/bootstrap
        run: terraform apply -auto-approve tfplan
