# Primary application deployment entry point.
name: Deploy App

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Environment to deploy
        required: true
        default: development
        type: choice
        options: [development, staging, production]

concurrency:
  group: marketplace-deploy-${{ inputs.target || github.ref_name || github.event_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  development-ready:
    if: >-
      (github.event_name == 'push' &&
       startsWith(github.ref, 'refs/heads/') &&
       github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'development')
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        name: Check development revision freshness
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            latest_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')"
            test -n "$latest_sha" || { echo "Could not resolve branch head" >&2; exit 1; }
            if [ "$latest_sha" != "$GITHUB_SHA" ]; then
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "Skipping superseded development deployment for $GITHUB_SHA; branch head is $latest_sha."
              exit 0
            fi
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

  deploy-development:
    needs: development-ready
    if: needs.development-ready.outputs.ready == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
    secrets: inherit

  report-staging-disabled:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_RELEASE_TOPOLOGY != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Staging is not provisioned; the main revision was not deployed."

  reject-disabled-staging-dispatch:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'staging' &&
      vars.ENABLE_RELEASE_TOPOLOGY != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Staging is disabled. Set ENABLE_RELEASE_TOPOLOGY=true and bootstrap staging first." >&2
          exit 1

  deploy-staging:
    if: >-
      vars.ENABLE_RELEASE_TOPOLOGY == 'true' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'staging'))
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets: inherit

  deploy-release-staging:
    if: >-
      vars.ENABLE_RELEASE_TOPOLOGY == 'true' &&
      (github.event_name == 'release' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'production'))
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets: inherit

  hosted-release-gates:
    needs: deploy-release-staging
    if: needs.deploy-release-staging.result == 'success'
    uses: ./.github/workflows/hosted-release-gates.yml
    with:
      staging_app_url: ${{ needs.deploy-release-staging.outputs.deployment_url }}
    secrets: inherit

  deploy-production-gated:
    needs: hosted-release-gates
    if: needs.hosted-release-gates.result == 'success'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      skip_app_checks: true
    secrets: inherit

  deploy-production-direct:
    if: >-
      vars.ENABLE_RELEASE_TOPOLOGY != 'true' &&
      (github.event_name == 'release' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'production'))
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
    secrets: inherit
