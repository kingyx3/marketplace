name: Terraform Platform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply platform changes
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  platform:
    runs-on: ubuntu-latest
    env:
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      SUPABASE_ORGANIZATION_ID: ${{ vars.SUPABASE_ORGANIZATION_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME }}
      VERCEL_ROOT_DIRECTORY: ${{ vars.VERCEL_ROOT_DIRECTORY }}
      SUPABASE_REGION: ${{ vars.SUPABASE_REGION }}
      SUPABASE_INSTANCE_SIZE: ${{ vars.SUPABASE_INSTANCE_SIZE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v3
      - name: Resolve CI/CD variables
        run: node scripts/resolve-terraform-inputs.mjs platform
      - name: Terraform init
        working-directory: infra/terraform/platform
        run: terraform init -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - name: Terraform fmt
        working-directory: infra/terraform/platform
        run: terraform fmt -check
      - name: Terraform validate
        working-directory: infra/terraform/platform
        run: terraform validate
      - name: Terraform plan
        working-directory: infra/terraform/platform
        run: terraform plan -out=tfplan
      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: infra/terraform/platform
        run: terraform apply -auto-approve tfplan
      - name: Export Terraform output contract
        if: ${{ inputs.apply }}
        working-directory: infra/terraform/platform
        run: terraform output -json > tf-outputs.json
