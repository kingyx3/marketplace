name: ZZZ-Terraform Platform

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment providing shared Terraform credentials and overrides
        required: true
        type: string

concurrency:
  group: marketplace-shared-infrastructure
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  converge:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENV: ${{ inputs.environment }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      ENABLE_RELEASE_TOPOLOGY: ${{ vars.ENABLE_RELEASE_TOPOLOGY }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      SUPABASE_ORGANIZATION_ID: ${{ vars.SUPABASE_ORGANIZATION_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME }}
      VERCEL_ROOT_DIRECTORY: ${{ vars.VERCEL_ROOT_DIRECTORY }}
      SUPABASE_REGION: ${{ vars.SUPABASE_REGION }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - name: Initialize and validate platform stack
        run: |
          terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
          terraform -chdir=infra/terraform/platform fmt -check
          terraform -chdir=infra/terraform/platform validate
      - name: Adopt existing provider resources
        run: node scripts/bootstrap-terraform-imports.mjs
      - name: Plan and apply the exact converged platform state
        shell: bash
        run: |
          set -euo pipefail
          plan="$RUNNER_TEMP/terraform-platform.tfplan"
          terraform -chdir=infra/terraform/platform plan -input=false -out="$plan"
          terraform -chdir=infra/terraform/platform show -no-color "$plan" >> "$GITHUB_STEP_SUMMARY"
          terraform -chdir=infra/terraform/platform apply -input=false -auto-approve "$plan"
          terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
          echo "Terraform platform converged." >> "$GITHUB_STEP_SUMMARY"
