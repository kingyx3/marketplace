name: Terraform Platform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply platform changes
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  platform:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_PREFIX: marketplace/platform
      TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
      TF_VAR_vercel_project_name: ${{ vars.VERCEL_PROJECT_NAME || 'marketplace' }}
      TF_VAR_vercel_root_directory: ${{ vars.VERCEL_ROOT_DIRECTORY }}
      TF_VAR_supabase_organization_id: ${{ vars.SUPABASE_ORGANIZATION_ID }}
      TF_VAR_supabase_environments: >-
        {"development":{"supabase_project_name":"${{ vars.SUPABASE_DEVELOPMENT_PROJECT_NAME }}","supabase_region":"${{ vars.SUPABASE_REGION || 'ap-southeast-1' }}","supabase_instance_size":"${{ vars.SUPABASE_INSTANCE_SIZE || 'micro' }}"},"production":{"supabase_project_name":"${{ vars.SUPABASE_PRODUCTION_PROJECT_NAME }}","supabase_region":"${{ vars.SUPABASE_REGION || 'ap-southeast-1' }}","supabase_instance_size":"${{ vars.SUPABASE_INSTANCE_SIZE || 'micro' }}"}}
      TF_VAR_supabase_db_secret_by_environment: >-
        {"development":"${{ secrets.SUPABASE_DEVELOPMENT_DB_PASSWORD }}","production":"${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}"}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Validate CI/CD variables
        run: |
          missing=0
          for key in GOOGLE_CREDENTIALS VERCEL_API_TOKEN SUPABASE_ACCESS_TOKEN TF_STATE_BUCKET_NAME TF_VAR_vercel_project_name TF_VAR_supabase_organization_id TF_VAR_supabase_environments TF_VAR_supabase_db_secret_by_environment; do
            if [ -z "${!key}" ]; then
              echo "Missing required variable: $key" >&2
              missing=1
            fi
          done
          for key in SUPABASE_DEVELOPMENT_PROJECT_NAME SUPABASE_PRODUCTION_PROJECT_NAME; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub variable: $key" >&2
              missing=1
            fi
          done
          [ "$missing" = "0" ] || exit 1
        env:
          SUPABASE_DEVELOPMENT_PROJECT_NAME: ${{ vars.SUPABASE_DEVELOPMENT_PROJECT_NAME }}
          SUPABASE_PRODUCTION_PROJECT_NAME: ${{ vars.SUPABASE_PRODUCTION_PROJECT_NAME }}
      - name: Terraform init
        working-directory: infra/terraform/platform
        run: terraform init -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - name: Terraform fmt
        working-directory: infra/terraform/platform
        run: terraform fmt -check
      - name: Terraform validate
        working-directory: infra/terraform/platform
        run: terraform validate
      - name: Terraform plan
        working-directory: infra/terraform/platform
        run: terraform plan -out=tfplan
      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: infra/terraform/platform
        run: terraform apply -auto-approve tfplan
