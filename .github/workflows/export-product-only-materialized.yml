name: Export product-only materialized source

on:
  push:
    branches:
      - agent/export-product-only-materialized

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: product-only-materialized-source
          path: .
          include-hidden-files: true
          retention-days: 1
