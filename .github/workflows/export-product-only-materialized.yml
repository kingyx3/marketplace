name: Export product-only materialized source

on:
  push:
    branches:
      - agent/export-product-only-materialized
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  export:
    if: github.event_name == 'push' || github.head_ref == 'agent/export-product-only-materialized'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Export complete branch history and Actions metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git bundle create product-only-history.bundle --all
          git log --all --graph --decorate --oneline > product-only-history.log
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?branch=agent%2Fproduct-only-catalog&per_page=100" \
            > product-only-actions-runs.json
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: product-only-materialized-source
          path: |
            .
            product-only-history.bundle
            product-only-history.log
            product-only-actions-runs.json
          include-hidden-files: true
          retention-days: 1
