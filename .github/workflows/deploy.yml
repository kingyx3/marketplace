name: ZZZ-Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment to deploy (development | staging | production)
        required: true
        type: string
      skip_app_checks:
        description: Skip duplicate app checks when a parent workflow already ran them
        required: false
        default: false
        type: boolean
    outputs:
      deployment_url:
        description: Immutable deployment URL produced or reused for this source revision
        value: ${{ jobs.deploy.outputs.deployment_url }}

permissions:
  contents: read

jobs:
  validate-env:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: &resolved_environment
      TARGET_ENV: ${{ inputs.environment }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      ADMIN_EMAIL_ALLOWLIST: ${{ vars.ADMIN_EMAIL_ALLOWLIST }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      GOOGLE_AUTH_ENABLED: ${{ vars.GOOGLE_AUTH_ENABLED }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
      SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
      STRIPE_WEBHOOK_ENDPOINT_ID: ${{ vars.STRIPE_WEBHOOK_ENDPOINT_ID }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      SYNTHETIC_MONITOR_SECRET: ${{ secrets.SYNTHETIC_MONITOR_SECRET }}
      OPERATIONAL_ALERT_WEBHOOK_URL: ${{ secrets.OPERATIONAL_ALERT_WEBHOOK_URL }}
      OPERATIONAL_ALERT_WEBHOOK_SECRET: ${{ secrets.OPERATIONAL_ALERT_WEBHOOK_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict --require-db-password --verify-supabase-keys
      - run: node scripts/generate-env.mjs --check --allow-missing-provisioned
      - name: Enforce hosted infrastructure and provider readiness
        if: ${{ inputs.environment != 'development' }}
        run: node scripts/verify-environment.mjs --skip-health

  app-checks:
    if: ${{ !inputs.skip_app_checks }}
    uses: ./.github/workflows/app-checks.yml
    with:
      run_e2e: false

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run database migration and contract suite
        run: bash .github/ci/run-database-contracts.sh
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: deployment-migration-log-${{ inputs.environment }}
          path: migration.log
          if-no-files-found: ignore
          retention-days: 7

  migrate:
    needs: [validate-env, migration-check]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: *resolved_environment
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict --require-db-password
      - name: Link and push hosted migrations with pinned CLI
        run: |
          SUPABASE_CLI=$(node -e 'const v=require("./config/tool-versions.json"); process.stdout.write(v.supabaseCli)')
          npx --yes "supabase@$SUPABASE_CLI" link --project-ref "$SUPABASE_PROJECT_REF"
          npx --yes "supabase@$SUPABASE_CLI" db push

  deploy:
    needs: [app-checks, migrate]
    if: ${{ always() && needs.migrate.result == 'success' && (inputs.skip_app_checks || needs.app-checks.result == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.vercel.outputs.deployment_url }}
    outputs:
      deployment_url: ${{ steps.vercel.outputs.deployment_url }}
    env: *resolved_environment
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict
      - name: Reconcile providers and Vercel runtime environment
        run: node scripts/reconcile-runtime-environment.mjs --providers apply-if-configured
      - name: Deploy or reuse identical Vercel deployment
        id: vercel
        run: node scripts/deploy-vercel.mjs

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    env:
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Health check
        run: node scripts/check-deployment-health.mjs "${{ needs.deploy.outputs.deployment_url }}"
      - name: Deep readiness check
        if: ${{ inputs.environment != 'development' }}
        run: node scripts/check-deployment-health.mjs "${{ needs.deploy.outputs.deployment_url }}" --deep
