name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment to deploy (development | production)
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-env:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: &resolved_environment
      TARGET_ENV: ${{ inputs.environment }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      GOOGLE_AUTH_ENABLED: ${{ vars.GOOGLE_AUTH_ENABLED }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      STRIPE_WEBHOOK_ENDPOINT_ID: ${{ vars.STRIPE_WEBHOOK_ENDPOINT_ID }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - name: Resolve Terraform backend inputs
        run: node scripts/resolve-terraform-inputs.mjs platform
      - name: Terraform init
        run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - name: Export Terraform outputs
        run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - name: Resolve Terraform and provider config
        run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict --require-db-password
      - name: Validate pre-provision environment contract
        run: node scripts/generate-env.mjs --check --allow-missing-provisioned
      - name: Enforce production infrastructure and provider readiness
        if: ${{ inputs.environment == 'production' }}
        run: node scripts/verify-environment.mjs --skip-health

  app-checks:
    uses: ./.github/workflows/app-checks.yml
    with:
      run_e2e: false

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7.0.0
      - run: psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f .github/ci/auth-shim.sql
      - name: Apply migrations in order
        run: |
          for f in supabase/migrations/*.sql; do
            echo "applying $f"
            psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
      - run: psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f supabase/seed.sql

  migrate:
    needs: [validate-env, migration-check]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env: *resolved_environment
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict --require-db-password
      - name: Link and push hosted migrations with pinned CLI
        run: |
          SUPABASE_CLI=$(node -e 'const v=require("./config/tool-versions.json"); process.stdout.write(v.supabaseCli)')
          npx --yes "supabase@$SUPABASE_CLI" link --project-ref "$SUPABASE_PROJECT_REF"
          npx --yes "supabase@$SUPABASE_CLI" db push

  deploy:
    needs: [app-checks, migrate]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.vercel.outputs.deployment_url }}
    outputs:
      deployment_url: ${{ steps.vercel.outputs.deployment_url }}
    env: *resolved_environment
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - run: node scripts/resolve-environment.mjs --environment "${{ inputs.environment }}" --tf-output-json infra/terraform/platform/tf-outputs.json --strict
      - name: Reconcile providers and Vercel runtime environment
        run: node scripts/reconcile-runtime-environment.mjs --providers apply-if-configured
      - name: Deploy or reuse identical Vercel deployment
        id: vercel
        run: node scripts/deploy-vercel.mjs

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          URL="${{ needs.deploy.outputs.deployment_url }}"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/health") && [ "$code" = "200" ] && exit 0
            echo "attempt $i: HTTP $code — retrying in $((i*5))s"
            sleep $((i*5))
          done
          exit 1
      - name: Deep readiness check
        if: ${{ inputs.environment == 'production' }}
        run: |
          URL="${{ needs.deploy.outputs.deployment_url }}"
          code=$(curl -s -o readiness.json -w '%{http_code}' "$URL/api/health?deep=1")
          cat readiness.json
          test "$code" = "200"
