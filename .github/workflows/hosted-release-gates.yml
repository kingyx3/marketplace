name: ZZZ-Hosted Release Gates

on:
  workflow_call:
    inputs:
      staging_app_url:
        description: Immutable staging deployment URL for the exact release commit
        required: true
        type: string

permissions:
  contents: read

jobs:
  staging-identity-payment-operations:
    name: Staging Auth, RLS, HitPay, OAuth, notifications, and operations
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    env:
      TARGET_ENV: staging
      APP_NAME: ${{ vars.APP_NAME }}
      STAGING_APP_URL: ${{ inputs.staging_app_url }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      ADMIN_EMAIL_ALLOWLIST: ${{ vars.ADMIN_EMAIL_ALLOWLIST }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      HITPAY_API_URL: ${{ vars.HITPAY_API_URL }}
      HITPAY_PAYMENT_METHODS: ${{ vars.HITPAY_PAYMENT_METHODS }}
      HITPAY_WEBHOOK_ID: ${{ vars.HITPAY_WEBHOOK_ID }}
      HITPAY_WEBHOOK_ENABLED_EVENTS: ${{ vars.HITPAY_WEBHOOK_ENABLED_EVENTS }}
      GOOGLE_AUTH_ENABLED: ${{ vars.GOOGLE_AUTH_ENABLED }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      HITPAY_API_KEY: ${{ secrets.HITPAY_API_KEY }}
      HITPAY_WEBHOOK_SALT: ${{ secrets.HITPAY_WEBHOOK_SALT }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      SYNTHETIC_MONITOR_SECRET: ${{ secrets.SYNTHETIC_MONITOR_SECRET }}
      OPERATIONAL_ALERT_WEBHOOK_URL: ${{ secrets.OPERATIONAL_ALERT_WEBHOOK_URL }}
      OPERATIONAL_ALERT_WEBHOOK_SECRET: ${{ secrets.OPERATIONAL_ALERT_WEBHOOK_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      OPERATIONS_OWNER: ${{ vars.OPERATIONS_OWNER }}
      INCIDENT_ESCALATION_URL: ${{ vars.INCIDENT_ESCALATION_URL }}
      CHECKOUT_AVAILABILITY_SLO_PERCENT: ${{ vars.CHECKOUT_AVAILABILITY_SLO_PERCENT }}
      CHECKOUT_LATENCY_SLO_MS: ${{ vars.CHECKOUT_LATENCY_SLO_MS }}
      PAYMENT_RECONCILIATION_SLO_MINUTES: ${{ vars.PAYMENT_RECONCILIATION_SLO_MINUTES }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - name: Resolve staging provider credentials
        run: node scripts/resolve-environment.mjs --environment staging --tf-output-json infra/terraform/platform/tf-outputs.json --strict --require-db-password
      - name: Verify real Supabase Auth, RLS, staff revocation, and Storage
        run: node scripts/verify-hosted-supabase.mjs 2>&1 | tee hosted-supabase.log
      - name: Verify hosted Google OAuth redirect flow
        run: node scripts/verify-google-oauth-staging.mjs 2>&1 | tee hosted-oauth.log
      - name: Verify HitPay sandbox, signed webhooks, and refund readiness
        run: node scripts/verify-hitpay-staging.mjs 2>&1 | tee hosted-hitpay.log
      - name: Verify deep readiness, cron, SLOs, ownership, correlation, and alert delivery
        run: node scripts/verify-hosted-operations.mjs 2>&1 | tee hosted-operations.log
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: staging-release-gate-evidence-${{ github.sha }}
          path: |
            hosted-supabase.log
            hosted-oauth.log
            hosted-hitpay.log
            hosted-operations.log
          retention-days: 90
          if-no-files-found: error

  production-provider-readiness:
    needs: staging-identity-payment-operations
    name: Production Supabase security and recovery window
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      TARGET_ENV: production
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_REQUIRED_BACKUP_MODE: pitr
      SUPABASE_MINIMUM_BACKUP_RETENTION_DAYS: ${{ vars.SUPABASE_MINIMUM_BACKUP_RETENTION_DAYS || '7' }}
      SUPABASE_ADVISOR_ALLOWLIST: ${{ vars.SUPABASE_ADVISOR_ALLOWLIST }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - run: node scripts/resolve-terraform-inputs.mjs platform
      - run: terraform -chdir=infra/terraform/platform init -input=false -lockfile=readonly -backend-config="bucket=$TF_STATE_BUCKET_NAME" -backend-config="prefix=$TF_STATE_PREFIX"
      - run: terraform -chdir=infra/terraform/platform output -json > infra/terraform/platform/tf-outputs.json
      - name: Resolve production project reference
        run: |
          node --input-type=module <<'NODE'
          import { appendFile, readFile } from 'node:fs/promises';
          const outputs = JSON.parse(await readFile('infra/terraform/platform/tf-outputs.json', 'utf8'));
          const ref = outputs.supabase_project_refs?.value?.production || '';
          if (!ref) throw new Error('Production SUPABASE_PROJECT_REF was not found in Terraform outputs');
          await appendFile(process.env.GITHUB_ENV, `SUPABASE_PROJECT_REF=${ref}\n`);
          NODE
      - name: Verify recoverable PITR window and Supabase advisors
        run: node scripts/verify-supabase-provider-readiness.mjs 2>&1 | tee production-provider-readiness.log
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: production-provider-readiness-${{ github.sha }}
          path: production-provider-readiness.log
          retention-days: 90
          if-no-files-found: error
