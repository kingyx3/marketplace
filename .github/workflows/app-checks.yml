name: ZZZ-App checks (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment that owns the APP_NAME variable
        required: true
        type: string
      run_e2e:
        description: Run the Playwright smoke suite
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      APP_NAME: ${{ vars.APP_NAME }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: lint
            command: npm run lint
          - check: typecheck
            command: npm run typecheck
          - check: test
            command: npm test
          - check: build
            command: npm run build
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Require configured app name
        run: node -e 'if (!process.env.APP_NAME?.trim()) throw new Error("GitHub variable APP_NAME is required")'
      - run: npm ci
      - name: Run ${{ matrix.check }}
        shell: bash
        run: |
          set -o pipefail
          ${{ matrix.command }} 2>&1 | tee "app-check-${{ matrix.check }}.log"
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: app-check-${{ matrix.check }}
          path: app-check-${{ matrix.check }}.log
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    if: inputs.run_e2e
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      APP_NAME: ${{ vars.APP_NAME }}
      MARKETPLACE_PREVIEW_FIXTURES: "true"
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Require configured app name
        run: node -e 'if (!process.env.APP_NAME?.trim()) throw new Error("GitHub variable APP_NAME is required")'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build and run E2E
        shell: bash
        run: |
          set -o pipefail
          {
            npm run build
            npm run test:e2e
          } 2>&1 | tee app-check-e2e.log
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: app-check-e2e
          path: app-check-e2e.log
          retention-days: 7
          if-no-files-found: ignore
