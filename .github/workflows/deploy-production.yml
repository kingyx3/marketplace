name: Deploy production

on:
  release:
    types: [published]
  push:
    tags: ['v*']

concurrency:
  group: marketplace-environment-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets: inherit

  hosted-release-gates:
    needs: deploy-staging
    uses: ./.github/workflows/hosted-release-gates.yml
    with:
      staging_app_url: ${{ needs.deploy-staging.outputs.deployment_url }}
    secrets: inherit

  deploy-production:
    needs: hosted-release-gates
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      skip_app_checks: true
    secrets: inherit
