name: Validate HitPay configuration

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/migrate-payments-to-hitpay'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      SUPABASE_SECRET_KEY: test-secret-key
      HITPAY_API_KEY: test-hitpay-key
      HITPAY_WEBHOOK_SALT: test-hitpay-salt
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      APP_NAME: Marketplace
      TARGET_ENV: development
      GOOGLE_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/migrate-payments-to-hitpay
          fetch-depth: 0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture validation
        shell: bash
        run: |
          set +e
          mkdir -p tmp/hitpay-validation
          npm run lint > tmp/hitpay-validation/lint.txt 2>&1
          lint=$?
          npm run typecheck > tmp/hitpay-validation/typecheck.txt 2>&1
          typecheck=$?
          npm test > tmp/hitpay-validation/tests.txt 2>&1
          tests=$?
          npm run config:check > tmp/hitpay-validation/config.txt 2>&1
          config=$?
          printf 'lint=%s\ntypecheck=%s\ntests=%s\nconfig=%s\n' "$lint" "$typecheck" "$tests" "$config" > tmp/hitpay-validation/summary.txt
      - name: Publish validation diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f tmp/hitpay-validation/*.txt
          if ! git diff --cached --quiet; then
            git commit -m "Capture HitPay validation diagnostics"
            git push origin HEAD:agent/migrate-payments-to-hitpay
          fi
