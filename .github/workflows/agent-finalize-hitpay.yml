name: Diagnose HitPay migration

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/migrate-payments-to-hitpay'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      SUPABASE_SECRET_KEY: test-secret-key
      HITPAY_API_KEY: test-hitpay-key
      HITPAY_WEBHOOK_SALT: test-hitpay-salt
      HITPAY_API_URL: https://api.sandbox.hit-pay.com
      HITPAY_PAYMENT_METHODS: paynow_online
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      APP_NAME: Marketplace
      TARGET_ENV: development
      GOOGLE_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/migrate-payments-to-hitpay
          fetch-depth: 0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture validation output
        shell: bash
        run: |
          set +e
          mkdir -p tmp/hitpay-ci
          npm run lint > tmp/hitpay-ci/lint.log 2>&1
          lint_code=$?
          npm run typecheck > tmp/hitpay-ci/typecheck.log 2>&1
          typecheck_code=$?
          npm test > tmp/hitpay-ci/unit-tests.log 2>&1
          tests_code=$?
          npm run config:check > tmp/hitpay-ci/config-check.log 2>&1
          config_code=$?
          printf 'lint=%s\ntypecheck=%s\nunit_tests=%s\nconfig_check=%s\n' \
            "$lint_code" "$typecheck_code" "$tests_code" "$config_code" \
            > tmp/hitpay-ci/summary.txt
          exit 0
      - name: Publish diagnostic logs to branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tmp/hitpay-ci
          git commit -m "Add temporary HitPay validation diagnostics"
          git push origin HEAD:agent/migrate-payments-to-hitpay
