name: Minimize HitPay configuration

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  minimize:
    if: github.event.pull_request.head.ref == 'agent/migrate-payments-to-hitpay'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      SUPABASE_SECRET_KEY: test-secret-key
      HITPAY_API_KEY: test-hitpay-key
      HITPAY_WEBHOOK_SALT: test-hitpay-salt
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      APP_NAME: Marketplace
      TARGET_ENV: development
      GOOGLE_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: agent/migrate-payments-to-hitpay
          fetch-depth: 0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Apply minimal HitPay environment contract
        run: |
          python3 scripts/minimize-hitpay-environment.py
          python3 scripts/post-minimize-hitpay.py
      - name: Regenerate environment artifacts
        run: npm run env:artifacts:write
      - name: Commit minimized configuration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A -- ':!.github/workflows/**'
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Minimize required HitPay configuration"
            git push origin HEAD:agent/migrate-payments-to-hitpay
          fi
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Configuration contract
        run: npm run config:check
