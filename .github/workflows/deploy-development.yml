# Feature branches -> development environment when deploy prerequisites exist.
# Docs-only changes are skipped by the paths-ignore guard.
name: Deploy development

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: environment-development
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-ready:
    runs-on: ubuntu-latest
    environment: development
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    env:
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - id: check
        name: Check development deploy prerequisites
        shell: bash
        run: |
          latest_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')"
          if [ -z "$latest_sha" ]; then
            echo "Could not resolve the latest branch revision" >&2
            exit 1
          fi
          if [ "$latest_sha" != "$GITHUB_SHA" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded development deploy for $GITHUB_SHA; branch head is $latest_sha." >&2
            exit 0
          fi

          missing=()
          for key in GCP_TERRAFORM_CREDENTIALS_JSON VERCEL_TOKEN SUPABASE_ACCESS_TOKEN; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping development deploy; missing deployment prerequisite(s): ${missing[*]}" >&2
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: deploy-ready
    if: needs.deploy-ready.outputs.ready == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
    secrets: inherit
