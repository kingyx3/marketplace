# The shared development data environment follows one integration branch.
name: Deploy development

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: marketplace-environment-development
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-ready:
    runs-on: ubuntu-latest
    environment: development
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    env:
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - id: check
        name: Check development deploy prerequisites and revision freshness
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            latest_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')"
            test -n "$latest_sha" || { echo "Could not resolve branch head" >&2; exit 1; }
            if [ "$latest_sha" != "$GITHUB_SHA" ]; then
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "Skipping superseded development deploy for $GITHUB_SHA; branch head is $latest_sha."
              exit 0
            fi
          fi
          missing=()
          for key in GCP_TERRAFORM_CREDENTIALS_JSON VERCEL_TOKEN SUPABASE_ACCESS_TOKEN; do
            [ -n "${!key:-}" ] || missing+=("$key")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping development deploy; missing: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: deploy-ready
    if: needs.deploy-ready.outputs.ready == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
    secrets: inherit
