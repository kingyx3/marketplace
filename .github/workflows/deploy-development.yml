# Feature branches → development environment when versioned public config is populated.
# Docs-only changes are skipped by the paths-ignore guard.
name: Deploy development

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: deploy-development
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  config-ready:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: Check development public config
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { readFileSync } = require('node:fs');
          const config = JSON.parse(readFileSync('config/environments.json', 'utf8'));
          const shared = config.shared || {};
          const development = config.environments?.development || {};
          const required = [
            'APP_NAME',
            'NEXT_PUBLIC_SITE_URL',
            'NEXT_PUBLIC_SUPABASE_URL',
            'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY',
            'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY',
            'SUPABASE_PROJECT_REF',
            'VERCEL_ORG_ID',
            'VERCEL_PROJECT_ID',
          ];
          const values = { ...shared, ...development };
          const missing = required.filter((key) => !String(values[key] ?? '').trim());
          if (missing.length > 0) {
            console.log('ready=false');
            console.error(`Skipping development deploy; missing versioned public config: ${missing.join(', ')}`);
          } else {
            console.log('ready=true');
          }
          NODE

  deploy:
    needs: config-ready
    if: needs.config-ready.outputs.ready == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
    secrets: inherit
