name: Configure Google OAuth

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to configure
        required: true
        type: choice
        options: [development, production]

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Print required Google and Supabase URLs
        run: node scripts/configure-google-oauth.mjs --plan
      - name: Apply hosted Supabase Google provider
        run: node scripts/configure-google-oauth.mjs --apply
      - name: Verify hosted Supabase Google provider
        run: node scripts/configure-google-oauth.mjs --verify
