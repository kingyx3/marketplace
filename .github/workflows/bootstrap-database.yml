name: ZZZ-Database Bootstrap (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Hosted database environment to bootstrap
        required: true
        type: string
      deployment_url:
        description: Immutable deployment URL produced by CI/CD
        required: true
        type: string

concurrency:
  group: marketplace-database-bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bootstrap:
    name: Upsert and verify ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20
    env:
      TARGET_ENV: ${{ inputs.environment }}
      NEXT_PUBLIC_SITE_URL: ${{ inputs.deployment_url }}
      GCP_TERRAFORM_CREDENTIALS_JSON: ${{ secrets.GCP_TERRAFORM_CREDENTIALS_JSON }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      PROJECT_SLUG: ${{ vars.PROJECT_SLUG }}
      TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}
      TF_STATE_BUCKET_LOCATION: ${{ vars.TF_STATE_BUCKET_LOCATION }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: 1.15.8
      - run: npm ci
      - name: Resolve Terraform inputs
        run: node scripts/resolve-terraform-inputs.mjs bootstrap
      - name: Resolve selected database from provisioned CI/CD state
        run: |
          terraform -chdir=infra/terraform/platform init \
            -input=false \
            -lockfile=readonly \
            -backend-config="bucket=$TF_STATE_BUCKET_NAME" \
            -backend-config="prefix=$TF_STATE_PREFIX"
          terraform -chdir=infra/terraform/platform output -json \
            > infra/terraform/platform/tf-outputs.json
          node scripts/resolve-environment.mjs \
            --environment "${{ inputs.environment }}" \
            --tf-output-json infra/terraform/platform/tf-outputs.json \
            --verify-supabase-keys
      - name: Validate bootstrap contract
        run: npx vitest run tests/database-bootstrap.test.ts
      - name: Upsert test data and verify storefront visibility
        shell: bash
        run: |
          set -o pipefail
          npm run db:bootstrap -- --target="${{ inputs.environment }}" 2>&1 | tee database-bootstrap.log
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: database-bootstrap-log-${{ inputs.environment }}
          path: database-bootstrap.log
          if-no-files-found: ignore
          retention-days: 7
