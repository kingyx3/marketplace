name: Synchronize OAuth and notification release gates once

on:
  push:
    branches:
      - agent/production-readiness-audit

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Patch hosted environment wiring
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in ['.github/workflows/deploy.yml', '.github/workflows/bootstrap-environment.yml']:
              path = Path(filename)
              text = path.read_text()
              old = '      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}\n'
              new = old + '      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}\n      SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}\n'
              if text.count(old) != 1:
                  raise SystemExit(f'{filename}: expected one Google client id environment line')
              path.write_text(text.replace(old, new, 1))

          path = Path('.github/workflows/hosted-release-gates.yml')
          text = path.read_text()
          old = '      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}\n'
          new = old + '      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}\n'
          if text.count(old) != 1:
              raise SystemExit('hosted gate Google client id line changed')
          text = text.replace(old, new, 1)
          old = '      OPERATIONAL_ALERT_WEBHOOK_SECRET: ${{ secrets.OPERATIONAL_ALERT_WEBHOOK_SECRET }}\n'
          new = old + '      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}\n'
          if text.count(old) != 1:
              raise SystemExit('hosted gate alert secret line changed')
          text = text.replace(old, new, 1)
          old = '      - name: Verify real Supabase Auth, RLS, staff revocation, and Storage\n        run: node scripts/verify-hosted-supabase.mjs 2>&1 | tee hosted-supabase.log\n'
          new = old + '      - name: Verify hosted Google OAuth redirect flow\n        run: node scripts/verify-google-oauth-staging.mjs 2>&1 | tee hosted-oauth.log\n'
          if text.count(old) != 1:
              raise SystemExit('hosted gate Supabase step changed')
          text = text.replace(old, new, 1)
          old = '            hosted-supabase.log\n'
          new = old + '            hosted-oauth.log\n'
          if text.count(old) != 1:
              raise SystemExit('hosted gate artifact list changed')
          path.write_text(text.replace(old, new, 1))

          path = Path('scripts/bootstrap-github.mjs')
          text = path.read_text()
          old = '  "GOOGLE_OAUTH_CLIENT_ID",\n];'
          new = '  "GOOGLE_OAUTH_CLIENT_ID",\n  "RESEND_FROM_EMAIL",\n  "SUPPORT_EMAIL",\n];'
          if text.count(old) != 1:
              raise SystemExit('bootstrap common variables changed')
          text = text.replace(old, new, 1)
          old = '  "OPERATIONAL_ALERT_WEBHOOK_SECRET",\n];'
          new = '  "OPERATIONAL_ALERT_WEBHOOK_SECRET",\n  "RESEND_API_KEY",\n];'
          if text.count(old) != 1:
              raise SystemExit('bootstrap common secrets changed')
          text = text.replace(old, new, 1)
          old = '  if (name === "GOOGLE_OAUTH_CLIENT_ID") return false;\n'
          new = old + '  if (name === "SUPPORT_EMAIL") return false;\n'
          if text.count(old) != 1:
              raise SystemExit('bootstrap optional variable check changed')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Register hosted OAuth verification script
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const path = 'package.json';
          const pkg = JSON.parse(await readFile(path, 'utf8'));
          pkg.scripts['verify:hosted:oauth'] = 'node scripts/verify-google-oauth-staging.mjs';
          await writeFile(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          npm install --package-lock-only --ignore-scripts
      - name: Remove one-shot workflow
        run: rm .github/workflows/patch-resend-oauth-gates-once.yml
      - name: Commit synchronized hosted gates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy.yml .github/workflows/bootstrap-environment.yml .github/workflows/hosted-release-gates.yml scripts/bootstrap-github.mjs package.json package-lock.json .github/workflows/patch-resend-oauth-gates-once.yml
          git commit -m "test: gate hosted OAuth and delivered notifications"
          git push origin "HEAD:${GITHUB_REF_NAME}"
